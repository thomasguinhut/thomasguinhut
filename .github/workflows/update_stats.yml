name: Update GitHub Stats SVG
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node modules
        uses: actions/cache@v5
        id: cache-npm
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Clean output directory
        run: rm -rf output/*

      - name: Generate GitHub stats SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          EXCLUDED_REPOS: ${{ secrets.EXCLUDED_REPOS }}
          GITHUB_USERNAME: "thomasguinhut"
        run: |
          mkdir -p output
          node src/generators/stats_commits.js
          node src/generators/stats_general.js
          node src/generators/stats_langs.js
          node src/generators/stats_recents.js
          node src/generators/stats_visitors.js
          ls -la output/

      - name: Setup Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push updated SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add output/*.svg
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update GitHub stats SVG [ci skip]"
          git push origin main